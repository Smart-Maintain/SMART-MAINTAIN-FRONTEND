name: CI

on:
  push:
    branches: [frontend]
  pull_request:
    branches: [frontend]

env:
  IMAGE_NAME: ghcr.io/smart-maintain/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update image tag in deploy repo
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_REPO_PAT: ${{ secrets.DEPLOY_REPO_PAT }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          git config --global user.email "ci@smart-maintain"
          git config --global user.name "CI Bot"

          git clone https://x-access-token:${DEPLOY_REPO_PAT}@github.com/smart-maintain/deploy.git
          cd deploy

          sed -i "/repository: ghcr.io\/smart-maintain\/frontend/{n;s/tag: .*/tag: ${SHORT_SHA}/}" charts/umbrella/values-prod.yaml

          git add charts/umbrella/values-prod.yaml
          git diff --staged --quiet || git commit -m "ci: update frontend image tag to ${SHORT_SHA}"
          git push