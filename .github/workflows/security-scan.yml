name: Pipeline DevSecOps Front-End - Scans, Build, Sign & Notify

on:
  push:
    branches: [ "main", "master" ]

# ========================================================
# 🔑 CONFIGURATION DES PERMISSIONS
# ========================================================
permissions:
  contents: write
  packages: write  # Donne l'autorisation essentielle de créer et pousser l'image sur GHCR
  id-token: write

jobs:
  devsecops_pipeline:
    name: Chaîne de Sécurité Front-End & Signature
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    # ==========================================
    # 🛠️ ÉTAPE 1 : CONFIGURATION DE NODE.JS
    # ==========================================
    - name: Configurer Node.js et installer les dépendances
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Installer les dépendances & Compiler le Front-End
      run: |
        npm install
        npm run build --prod || npm run build || true

    # ==========================================
    # ÉTAPE 2 : SCANS DE SÉCURITÉ (Génération des JSON)
    # ==========================================
    - name: Scanner le code source (Semgrep SAST)
      run: |
        pip install semgrep
        semgrep scan --json --output=semgrep-results.json || true

    - name: Configurer Snyk CLI
      uses: snyk/actions/setup@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Scanner les dépendances Node (Snyk SCA)
      run: |
        snyk auth ${{ secrets.SNYK_TOKEN }}
        snyk test --json-file-output=snyk-results.json --skip-unresolved=true || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Scanner le dossier (Trivy)
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-results.json'
        exit-code: '0'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ==========================================
    # ÉTAPE 3 : LOGINS & BUILD DOCKER SUR GHCR
    # ==========================================
    - name: Connexion à GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Construire et Pousser l'image Docker vers GHCR
      run: |
        # 1. On passe le nom du dépôt en minuscules (ex: smart-maintain-frontend)
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        # 2. Construction de l'image via ton Dockerfile
        docker build -t $IMAGE_NAME:latest .
        
        # 3. Envoi sur le registre sécurisé GitHub
        docker push $IMAGE_NAME:latest

    # ==========================================
    # ÉTAPE 4 : SIGNATURE NUMÉRIQUE COSIGN SUR GHCR
    # ==========================================
    - name: Installer Cosign dans la VM Actions
      uses: sigstore/cosign-installer@v3.5.0

    - name: Signer l'image Docker publiée sur GHCR
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        cosign sign --yes --key env://COSIGN_PRIVATE_KEY $IMAGE_NAME:latest
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

    # ==========================================
    # ÉTAPE 5 : ANALYSE DES RESULTATS & ALERTE BOT TELEGRAM
    # ==========================================
    - name: Configurer l'environnement Python pour Notification
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Exécuter le Script d'Analyse et Envoi Telegram
      run: |
        pip install requests reportlab
        python "$GITHUB_WORKSPACE/security-notify.py"
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        
