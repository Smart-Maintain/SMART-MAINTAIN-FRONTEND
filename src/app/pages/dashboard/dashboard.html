<div style="display: flex; min-height: 100vh; background-color: #0A0A0A;">
  <!-- Sidebar -->
  <aside
    [style.width]="collapsed ? '60px' : '240px'"
    style="
      background-color: #0A0A0A;
      border-right: 1px solid rgba(240,240,240,0.06);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 50;
    "
  >
    <div
      style="
        padding: 20px;
        border-bottom: 1px solid rgba(240,240,240,0.06);
        display: flex;
        align-items: center;
      "
      [style.justify-content]="collapsed ? 'center' : 'space-between'"
    >
      <a
        *ngIf="!collapsed"
        routerLink="/"
        style="
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.14em;
          color: #F0F0F0;
          text-decoration: none;
          font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
        "
      >
        TURBINEFORCE
      </a>
      <button
        (click)="toggleSidebar()"
        style="
          background: none;
          border: none;
          color: #8A8A93;
          cursor: pointer;
          font-size: 16px;
          padding: 4px;
        "
      >
        {{ collapsed ? '☰' : '✕' }}
      </button>
    </div>

    <nav style="flex: 1; padding: 16px 0;">
      <a
        *ngFor="let item of filteredNav"
        [routerLink]="item.path"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{exact: item.path === '/dashboard'}"
        style="
          display: flex;
          align-items: center;
          gap: 12px;
          text-decoration: none;
          font-size: 12px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          font-weight: 500;
          transition: all 0.2s ease;
          border-left: 3px solid transparent;
        "
        [style.padding]="collapsed ? '12px 0' : '12px 20px'"
        [style.justify-content]="collapsed ? 'center' : 'flex-start'"
        [style.color]="'#8A8A93'"
      >
        <span style="font-size: 14px;">{{ item.icon }}</span>
        <span *ngIf="!collapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div
      style="
        padding: 16px 20px;
        border-top: 1px solid rgba(240,240,240,0.06);
      "
    >
      <div *ngIf="!collapsed && auth.user()" style="margin-bottom: 12px;">
        <p
          style="
            font-size: 12px;
            color: #F0F0F0;
            font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
            font-weight: 500;
            margin-bottom: 4px;
          "
        >
          {{ auth.user()?.name || 'User' }}
        </p>
        <p
          style="
            font-size: 10px;
            color: #F28C28;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          "
        >
          {{ auth.user()?.role }}
        </p>
      </div>
      <button
        (click)="logout()"
        style="
          background: none;
          border: 1px solid rgba(240,240,240,0.12);
          color: #8A8A93;
          font-size: 11px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          cursor: pointer;
          font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          transition: all 0.2s ease;
        "
        [style.padding]="collapsed ? '8px' : '8px 16px'"
        [style.width]="collapsed ? '40px' : '100%'"
      >
        {{ collapsed ? '→' : 'Sign Out' }}
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main
    [style.margin-left]="collapsed ? '60px' : '240px'"
    style="
      flex: 1;
      transition: margin-left 0.3s ease;
      min-height: 100vh;
    "
  >
    <!-- Top Bar -->
    <div
      style="
        height: 56px;
        background-color: #0A0A0A;
        border-bottom: 1px solid rgba(240,240,240,0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 40;
      "
    >
      <div style="display: flex; gap: 24px; align-items: center;">
        <span
          style="
            font-size: 11px;
            letter-spacing: 0.14em;
            color: #8A8A93;
            text-transform: uppercase;
            font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          "
        >
          {{ todayDate }}
        </span>
        <span
          style="
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #00A8E8;
            text-transform: uppercase;
            font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          "
        >
          System Online
        </span>
      </div>
      <div style="display: flex; gap: 16px; align-items: center;">
        <span
          style="
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #00A8E8;
            display: inline-block;
          "
        ></span>
        <span
          style="
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #8A8A93;
            text-transform: uppercase;
            font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
          "
        >
          Data Link Active
        </span>
      </div>
    </div>

    <!-- Router Outlet for nested dashboard routes -->
    <router-outlet></router-outlet>
  </main>
</div>
